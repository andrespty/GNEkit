site_name: "Generalized Nash Kit"

theme:
  name: material
  palette:
    primary: blue grey
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes

plugins:
  - awesome-pages
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_root_toc_entry: false
            show_signature_annotations: true
            separate_signature: true
            show_category_heading: false   # adds "Classes", "Functions", "Methods"
            show_submodules: false
            show_bases: false
            show_source: false
            show_source_order: true
            members_order: source


markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.arithmatex:
      generic: true
  - toc
  - attr_list
  
extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6


  

# Global site menu
# https://www.mkdocs.org/user-guide/writing-your-docs/#file-layout
nav:
  - Home: index.md
  - Getting Started: 
    - Overview: getting_started/overview.md
    - Installation: getting_started/installation.md
    - Quickstart: getting_started/quick_start.md

  - Guides:
    - Core Concepts: guides/core_concepts.md
    - Defining New GNE Problems: guides/gne_problems.md
    - Defining New D-GBNE Problems: guides/dgbne_problems.md
    - Choosing an Algorithm: guides/choosing_algorithm.md
  
  - API Reference:
      - Overview: reference/index.md
      - Problems:
          - BaseProblem: reference/problems/base_problem.md
          - BayesianProblem: reference/problems/bayesian_problem.md
      - Players:
          - BasePlayer: reference/players/base_player.md
          - BayesianPlayer: reference/players/bayesian_player.md
      - Algorithms:
          - BaseAlgorithm: reference/algorithms/base_algorithm.md
          - EnergyMethod: reference/algorithms/energy_method.md
      - Utilities:
          - construct_vectors: reference/functions/construct_vectors.md
          - create_wrapped_function: reference/functions/create_wrapped_function.md
          - flatten_variables: reference/functions/flatten_variables.md
          - one_hot_encoding: reference/functions/one_hot_encoding.md
      - Types:
          - Object Types: reference/types/object_types.md
          - Function Types: reference/types/type_functions.md

  - Examples: 
    - Overview: examples/examples.md
    - Standard Example: examples/standard.md
    - D-GBNE Example: examples/bayesian.md

  - Development:
      - Overview: development/overview.md
      - Standards: development/standards.md